services:
  api:
    environment:
      - LLM__EMBEDDING_PROVIDER=openrouter
      - LLM__EMBEDDING_MODEL=Pro/BAAI/bge-m3
      - VECTOR_STORE__DIMENSIONS=1024
    volumes:
      - ./patches:/app/patches:ro
    entrypoint: ["sh", "-c", "cp /app/patches/*.py /app/src/routers/ 2>/dev/null; cp /app/patches/*.py /app/src/schemas/ 2>/dev/null; sh /app/docker/entrypoint.sh"]

  deriver:
    environment:
      - LLM__EMBEDDING_PROVIDER=openrouter
      - LLM__EMBEDDING_MODEL=Pro/BAAI/bge-m3
      - VECTOR_STORE__DIMENSIONS=1024
    volumes:
      - ./patches:/app/patches:ro
    entrypoint: ["/bin/sh", "-c", "cp /app/patches/*.py /app/src/routers/ 2>/dev/null; cp /app/patches/*.py /app/src/schemas/ 2>/dev/null; /app/.venv/bin/python -m src.deriver"]
